[options]
; ── Database ────────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; ── Master Password ──────────────────────────────────────────────────────────
; This protects the /web/database/manager page.
; CHANGE THIS to something strong before any production use.
admin_passwd = odoo_master_2026

; ── Addons ───────────────────────────────────────────────────────────────────
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; ── Performance ──────────────────────────────────────────────────────────────
; Workers = 0 → single-threaded (fine for local/dev use)
workers = 0
max_cron_threads = 1

; ── Logging ──────────────────────────────────────────────────────────────────
logfile = /var/lib/odoo/odoo.log
log_level = warn

; ── JSON-RPC / HTTP ──────────────────────────────────────────────────────────
; The JSON-RPC API is enabled by default at /jsonrpc
; No extra config needed — available as soon as Odoo is running.
; Test it with: curl -s http://localhost:8069/web/health | python -m json.tool
xmlrpc = True
xmlrpc_port = 8069
